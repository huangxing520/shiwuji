name: Flutter Android 自动构建 & 发布

# 触发规则：推送 v 开头的标签（如 v1.0.0）自动执行 | 支持手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取项目代码
      - name: 拉取代码
        uses: actions/checkout@v4
      # 3. 配置 Java 环境（Android 必须）
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'  # Eclipse Temurin (Adoptium)，稳定可靠
          java-version: '17'
          cache: 'gradle'  # 缓存Gradle依赖，加速构建
      # 2. 配置 Flutter 环境 🔴【唯一需要修改的地方：Flutter 版本】
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          # 👇 替换成你本地使用的 Flutter 版本（必填）
          flutter-version: 3.44.2
          channel: stable

      
      # 4. 安装项目依赖
      - name: 获取 Flutter 依赖
        run: flutter pub get

      # 5. 配置签名文件（自动从 GitHub 密钥读取，无需手动上传）
      - name: 生成签名文件
        run: |
          cd android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          echo "storeFile=keystore.jks" > key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties

      # 6. 构建 Release 版 APK
      - name: 编译生成 APK
        run: flutter build apk --split-per-abi

      # 7. 自动发布到 GitHub Release
      - name: 发布 APK
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/*.apk
          name:  ${{ github.ref_name }}
          body: |
            🚀 自动构建完成
            版本：${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}