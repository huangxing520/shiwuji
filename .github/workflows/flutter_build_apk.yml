name: Flutter Android 自动构建 & 发布

# 触发规则：推送 v 开头的标签（如 v1.0.0）自动执行 | 支持手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许创建 Release
    steps:
      # 1. 拉取项目代码
      - name: 拉取代码
        uses: actions/checkout@v4
      # 3. 配置 Java 环境（Android 必须）
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'  # Eclipse Temurin (Adoptium)，稳定可靠
          java-version: '17'
          cache: 'gradle'  # 缓存Gradle依赖，加速构建
      # 2. 配置 Flutter 环境 🔴【唯一需要修改的地方：Flutter 版本】
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          # 👇 替换成你本地使用的 Flutter 版本（必填）
          flutter-version: 3.44.2
          channel: stable

      
      # 4. 安装项目依赖
      - name: 获取 Flutter 依赖
        run: flutter pub get

      # 4.5 创建环境变量文件（.env），安全注入 BUGSNAG_API_KEY
      - name: 生成环境变量文件
        env:
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
        run: |
          if [ -z "$BUGSNAG_API_KEY" ]; then
            echo "::error::BUGSNAG_API_KEY secret 未设置，请在 GitHub Secrets 中配置该密钥"
            exit 1
          fi
          printf 'BUGSNAG_API_KEY=%s\n' "$BUGSNAG_API_KEY" > .env
          if [ ! -s .env ]; then
            echo "::error::.env 文件创建后为空，请检查 BUGSNAG_API_KEY secret"
            exit 1
          fi
          echo "::notice::.env 文件创建成功，BUGSNAG_API_KEY 已注入"

      # 5. 配置签名文件（自动从 GitHub 密钥读取，无需手动上传）
      - name: 生成签名文件
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          # 用 printf 避免换行；先校验 secret 非空
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret 未设置"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          if [ ! -s app/keystore.jks ]; then
            echo "::error::keystore.jks 解码后为空文件，请检查 KEYSTORE_BASE64 是否为有效 base64"
            exit 1
          fi
          printf 'storeFile=keystore.jks\n' > key.properties
          printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD" >> key.properties
          printf 'keyAlias=%s\n' "$KEY_ALIAS" >> key.properties
          printf 'keyPassword=%s\n' "$KEY_PASSWORD" >> key.properties

      # 6. 构建 Release 版 APK
      - name: 编译生成 APK
        run: flutter build apk --split-per-abi

      # 7. 自动发布到 GitHub Release
      - name: 发布 APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}